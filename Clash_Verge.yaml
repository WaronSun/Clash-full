# ============================================
# Clash Meta / Verge 通用稳定配置（修复版）
# ============================================

port: 7890
socks-port: 7891
mixed-port: 7893
redir-port: 7892

allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false

external-controller: 0.0.0.0:9090

# ================= DNS =================
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16

  nameserver:
    - 223.5.5.5
    - 114.114.114.114

  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  fallback-filter:
    geoip: true
    geoip-code: CN

# ================= 代理组 =================
proxy-groups:

- name: 所有-手动
  type: select
  proxies:
    - DIRECT

- name: 所有-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  use:
    - default

# ===== 区域组 =====
- name: 香港-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  filter: "(?i)香港|HK"

- name: 台湾-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  filter: "(?i)台湾|TW"

- name: 日本-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  filter: "(?i)日本|JP"

- name: 新加坡-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  filter: "(?i)新加坡|SG"

- name: 韩国-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  filter: "(?i)韩国|KR"

- name: 美国-自动
  type: url-test
  url: http://www.gstatic.com/generate_204
  interval: 180
  tolerance: 100
  filter: "(?i)美国|US"

