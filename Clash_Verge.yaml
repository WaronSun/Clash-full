mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
routing-mark: 7894
allow-lan: true
bind-address: "*"
ipv6: false
mode: rule
unified-delay: true
tcp-concurrent: true
find-process-mode: off
log-level: info
geodata-loader: standard
external-controller: :9999
disable-keep-alive: true

profile:
  store-selected: true

# 代理组定义
proxy-groups:
  # 1. 主选择中心
  - name: 🚀 节点选择
    type: select
    proxies:
      - ⚡ 自动选择
      - ⚖️ 故障转移
      - 🇭🇰 香港-自动
      - 🇨🇳 台湾-自动
      - 🇯🇵 日本-自动
      - 🇸🇬 新加坡-自动
      - 🇺🇸 美国-自动
      - 🇰🇷 韩国-自动
      - 🌐 其他-自动
      - 🛠️ 所有-手动
      - DIRECT

  # 2. 锚点定义：大部分分流默认走这些策略
  - name: 策略偏好
    type: select
    proxies: &a1
      - 🚀 节点选择
      - ⚡ 自动选择
      - 🇭🇰 香港-自动
      - 🇨🇳 台湾-自动
      - 🇯🇵 日本-自动
      - 🇸🇬 新加坡-自动
      - 🇺🇸 美国-自动
      - 🛠️ 所有-手动
      - DIRECT

  # 3. 应用分流组 (根据你的 QX 文件定制)
  - name: ✨ AI服务
    type: select
    proxies: *a1
  
  - name: 📘 GitHub
    type: select
    proxies: *a1

  - name: 👯‍♂️ TikTok
    type: select
    proxies:
      - ⚖️ 故障转移
      - 🇨🇳 台湾-自动
      - 🇯🇵 日本-自动
      - 🇸🇬 新加坡-自动
      - 🚀 节点选择

  - name: 🙋 Telegram
    type: select
    proxies: *a1

  - name: 🕊️ Twitter(X)
    type: select
    proxies: *a1

  - name: 🍎 Apple
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择
      - ⚡ 自动选择

  - name: Ⓜ️ Microsoft
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🎮 Steam/Game
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🎞️ YouTube
    type: select
    proxies: *a1

  - name: 🎥 Netflix/Disney
    type: select
    proxies: *a1

  - name: 🎵 Spotify
    type: select
    proxies: *a1

  - name: 🌍 国外网站
    type: select
    proxies: *a1

  - name: ➡️ 国内直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🚫 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  # 4. 地区自动化组 (移植自你的 QX 正则表达式)
  - name: 🛠️ 所有-手动
    type: select
    include-all: true

  - name: ⚡ 自动选择
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true

  - name: ⚖️ 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true

  - name: 🇭🇰 香港-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(广港|香港|HK|Hong Kong|🇭🇰|HongKong)"

  - name: 🇨🇳 台湾-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)"

  - name: 🇯🇵 日本-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)"

  - name: 🇸🇬 新加坡-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)"

  - name: 🇰🇷 韩国-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)"

  - name: 🇺🇸 美国-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)"

  - name: 🌐 其他-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true
    filter: "(波|柬|尼|也|克|比|尔|立|冰|秘|耳|利|埃|希|孟|芬|愛|澳|英|德|南|意|法|拿|墨|印|越|俄|瑞|智|荷|比|巴|沙|班|泰|德|烏|以|Australia|Konghwaguk)"

# 远程规则集 (Rule Providers)
rule-providers:
  ADBlock:
    type: http
    behavior: domain
    format: mrs
    url: "https://cdn.jsdelivr.net/gh/217heidai/adblockfilters@main/rules/adblockmihomolite.mrs"
    interval: 86400
    path: ./ruleset/adblock.mrs

  AI_Service:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/liandu2024/clash/refs/heads/main/list/AI.list"
    interval: 86400
    path: ./ruleset/ai.list

  GitHub:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/GitHub/GitHub.list"
    interval: 86400
    path: ./ruleset/github.list

  Telegram:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.list"
    interval: 86400
    path: ./ruleset/telegram.list

  YouTube:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list"
    interval: 86400
    path: ./ruleset/youtube.list

  TikTok:
    type: http
    behavior: classical
    format: text
    url: "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/TikTok/TikTok.list"
    interval: 86400
    path: ./ruleset/tiktok.list

# 分流规则
rules:
  - RULE-SET,ADBlock,🚫 广告拦截
  - RULE-SET,AI_Service,✨ AI服务
  - RULE-SET,GitHub,📘 GitHub
  - RULE-SET,Telegram,🙋 Telegram
  - RULE-SET,YouTube,🎞️ YouTube
  - RULE-SET,TikTok,👯‍♂️ TikTok
  
  # 这里的 GEOSITE 规则利用了 Mihomo 的内置库，比 QX 远程列表加载更快
  - GEOSITE,apple,🍎 Apple
  - GEOSITE,microsoft,Ⓜ️ Microsoft
  - GEOSITE,steam,🎮 Steam/Game
  - GEOSITE,netflix,🎥 Netflix/Disney
  - GEOSITE,disney,🎥 Netflix/Disney
  - GEOSITE,spotify,🎵 Spotify
  - GEOSITE,twitter,🕊️ Twitter(X)
  
  # 兜底分流
  - GEOSITE,gfw,🌍 国外网站
  - GEOSITE,cn,➡️ 国内直连
  - GEOIP,cn,➡️ 国内直连
  - MATCH,🚀 节点选择

# 其他高级设置
sniffer:
  enable: true
  sniff:
    TLS: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880]}
    QUIC: {ports: [443, 8443]}

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
