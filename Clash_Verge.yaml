# -------------------------------------------------------------------
# 2. 策略组定义 (Strictly Proxy Groups)
# -------------------------------------------------------------------
proxy-groups:
  # --- 基础节点组 (对应 QX 第3部分) ---
  - name: 所有-手动
    type: select
    include-all: true

  - name: 所有-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true

  - name: 港台日新韩-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广港|广台|广日|广新|广韩|广美|香港|HK|Hong Kong|🇭🇰|HongKong|台湾|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|新加坡|SG|坡|狮城|🇸🇬|Singapore|韩国|KR|首尔|春川|🇰🇷|Korea)"

  - name: 台日新韩-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广台|广日|广新|广韩|广美|台湾|TW|Tai Wan|Taiwan|🇹🇼|🇨🇳|TaiWan|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan|新加坡|SG|坡|狮城|🇸🇬|Singapore|韩国|KR|首尔|春川|🇰🇷|Korea)"

  - name: 香港-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广港|香港|HK|Hong Kong|🇭🇰|HongKong)"

  - name: 台湾-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)"

  - name: 日本-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)"

  - name: 新加坡-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)"

  - name: 韩国-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广韩|韩国|韓國|KR|首尔|春川|🇰🇷|Korea)"

  - name: 美国-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)"

  - name: 其他-自动
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 100
    include-all: true
    filter: "(波|柬|尼|也|克|比|尔|立|冰|秘|耳|利|埃|希|孟|芬|愛|澳|英|德|南|意|法|拿|墨|印|越|俄|瑞|智|荷|比|巴|沙|班|泰|德|烏|以|Australia|Konghwaguk)"

  # --- 业务逻辑策略组 (严格对应 QX 第二部分的 select 顺序) ---
  - name: ✨ AI1
    type: select
    proxies: &business_list
      - DIRECT
      - 所有-手动
      - 所有-自动
      - 港台日新韩-自动
      - 台日新韩-自动
      - 香港-自动
      - 台湾-自动
      - 日本-自动
      - 新加坡-自动
      - 韩国-自动
      - 美国-自动
      - 其他-自动
      - REJECT

  - name: ✨ AI2
    type: select
    proxies: *business_list

  - name: 📘 GitHub
    type: select
    proxies: *business_list

  - name: 👯‍♂️ TikTok
    type: select
    proxies: *business_list

  - name: 🙋 Telegram
    type: select
    proxies: *business_list

  - name: 🕊️ Twitter(X)
    type: select
    proxies: *business_list

  - name: 🗣️ Facebook
    type: select
    proxies: *business_list

  - name: 🌳 Amazon
    type: select
    proxies: *business_list

  - name: 🍎 Apple
    type: select
    proxies: *business_list

  - name: Ⓜ️ Microsoft
    type: select
    proxies: *business_list

  - name: 🎮 Steam
    type: select
    proxies: *business_list

  - name: 🕹️ Game
    type: select
    proxies: *business_list

  - name: 🎞️ YouTube
    type: select
    proxies: *business_list

  - name: 📺 SoopLive
    type: select
    proxies: *business_list

  - name: 📺 Disney
    type: select
    proxies: *business_list

  - name: 🎥 Netflix
    type: select
    proxies: *business_list

  - name: 🎬 HBO
    type: select
    proxies: *business_list

  - name: 🎵 Spotify
    type: select
    proxies: *business_list

  - name: 🎞️ OtherVideo
    type: select
    proxies: *business_list

  - name: 🌍 国外
    type: select
    proxies: *business_list

  - name: ➡️ 国内
    type: select
    proxies: *business_list

# -------------------------------------------------------------------
# 3. 规则映射 (Strictly Rules)
# -------------------------------------------------------------------
rules:
  - RULE-SET,AI1,✨ AI1
  - RULE-SET,AI2,✨ AI2
  - RULE-SET,GitHub,📘 GitHub
  - RULE-SET,TikTok,👯‍♂️ TikTok
  - RULE-SET,Telegram,🙋 Telegram
  - RULE-SET,Twitter,🕊️ Twitter(X)
  - RULE-SET,Facebook,🗣️ Facebook
  - RULE-SET,Amazon,🌳 Amazon
  - RULE-SET,Apple,🍎 Apple
  - RULE-SET,Microsoft,Ⓜ️ Microsoft
  - RULE-SET,Steam,🎮 Steam
  # Game 对应多个规则集
  - RULE-SET,Game_Epic,🕹️ Game
  - RULE-SET,Game_EA,🕹️ Game
  - RULE-SET,Game_Blizzard,🕹️ Game
  - RULE-SET,Game_UBI,🕹️ Game
  - RULE-SET,Game_Sony,🕹️ Game
  - RULE-SET,Game_Nintendo,🕹️ Game
  # YouTube 对应多个规则集
  - RULE-SET,YouTube1,🎞️ YouTube
  - RULE-SET,YouTube2,🎞️ YouTube
  - RULE-SET,SoopLive,📺 SoopLive
  - RULE-SET,Disney,📺 Disney
  - RULE-SET,Netflix,🎥 Netflix
  - RULE-SET,HBO,🎬 HBO
  - RULE-SET,Spotify,🎵 Spotify
  - RULE-SET,OtherVideo,🎞️ OtherVideo
  # 国外分流
  - RULE-SET,Global1,🌍 国外
  - RULE-SET,Global2,🌍 国外
  - RULE-SET,Global3,🌍 国外
  
  # 兜底分流 (QX 的 FINAL)
  - MATCH,➡️ 国内
